<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madalya Sistemli Flappy Batur</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #70c5ce;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 80vh;
        }
        .volume-container {
            margin-top: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 20px;
        }
        .volume-container input {
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<div class="volume-container">
    <label for="volumeSlider">🎵 Ses:</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.4">
    <span id="volumeValue">40%</span>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const volumeSlider = document.getElementById("volumeSlider");
const volumeValue = document.getElementById("volumeValue");

// --- MEDYA ELEMENTLERİ ---
const birdImg = new Image();
birdImg.src = "kus.png"; 

const gameOverImg = new Image();
gameOverImg.src = "oyun_bitti.png"; 

const menuBgImg = new Image();
menuBgImg.src = "menu_arka_plan.png"; 

const jumpSound = new Audio("ziplama.mp3"); 
jumpSound.volume = 0.6;

const bgMusic = new Audio("arka_plan_muzik.mp3"); 
bgMusic.loop = true; 
bgMusic.volume = parseFloat(volumeSlider.value);

volumeSlider.addEventListener("input", function() {
    bgMusic.volume = parseFloat(this.value);
    volumeValue.innerText = Math.round(this.value * 100) + "%";
});

// --- OYUN DURUMLARI ---
let gameState = "MENU"; 

let birdY = 300;
let birdX = 70;
let birdVelocity = 0;
const gravity = 0.4;
const jump = -7;
const birdSize = 50; 

let pipes = [];
const pipeWidth = 60;
const pipeGap = 160; 
let pipeSpeed = 2.5;
let frameCount = 0;

let score = 0;
// Tarayıcı hafızasından en yüksek skoru çekiyoruz (Yoksa 0 kabul et)
let highScore = localStorage.getItem("flappyHighScore") ? parseInt(localStorage.getItem("flappyHighScore")) : 0;

// KONTROLLER
document.addEventListener("keydown", (e) => { if(e.code === "Space") handleInput(); });
canvas.addEventListener("click", handleInput);
canvas.addEventListener("touchstart", function(e) {
    e.preventDefault(); 
    handleInput();
}, { passive: false });

function handleInput() {
    if (gameState === "MENU") {
        gameState = "PLAYING";
        bgMusic.play().catch(e => console.log("Müzik engellendi."));
    } else if (gameState === "PLAYING") {
        birdVelocity = jump;
        jumpSound.currentTime = 0; 
        jumpSound.play().catch(e => {});
    } else if (gameState === "GAMEOVER") {
        resetGameToMenu();
    }
}

function resetGameToMenu() {
    birdY = 300;
    birdVelocity = 0;
    pipes = [];
    score = 0;
    frameCount = 0;
    gameState = "MENU";
}

// Yeni Eklenen Madalya Çizim Fonksiyonu
function drawMedal(x, y, type) {
    let color = "";
    let ribbonColor = "#e74c3c"; // Kurdele rengi (Kırmızı)
    
    if (type === "GOLD") color = "#f1c40f";      // Altın Sarısı
    if (type === "SILVER") color = "#bdc3c7";    // Gümüş Grisi
    if (type === "BRONZE") color = "#d35400";    // Bronz Turuncusu

    // Kurdele Çizimi
    ctx.fillStyle = ribbonColor;
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 25);
    ctx.lineTo(x, y);
    ctx.lineTo(x + 10, y - 25);
    ctx.fill();

    // Madalya Gövdesi
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fill();

    // İç Çember (Detay)
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 15, 0, Math.PI * 2);
    ctx.stroke();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === "MENU") {
        if (menuBgImg.complete && menuBgImg.width > 0) {
            ctx.drawImage(menuBgImg, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#f1c40f"; 
        ctx.font = "bold 40px 'Arial Black', Gadget, sans-serif";
        ctx.textAlign = "center";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 8;
        ctx.fillText("FLAPPY BATUR", canvas.width / 2, canvas.height / 2 - 90);
        ctx.shadowBlur = 0; 

        // Menüde En Yüksek Skoru Göster
        ctx.fillStyle = "#fff";
        ctx.font = "bold 18px Arial";
        ctx.fillText(`🏆 EN YÜKSEK SKOR: ${highScore}`, canvas.width / 2, canvas.height / 2 - 40);

        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        ctx.fillRect(50, canvas.height / 2 - 10, 300, 120);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.fillText("🕹️ NASIL OYNANIR?", canvas.width / 2, canvas.height / 2 + 20);
        
        ctx.font = "14px Arial";
        ctx.fillStyle = "#ddd";
        ctx.fillText("Baturu borulardan kaçır ve rekor kır!", canvas.width / 2, canvas.height / 2 + 45);
        
        ctx.font = "bold 18px Arial";
        ctx.fillStyle = "#2ecc71"; 
        ctx.fillText("BAŞLAMAK İÇİN BATURA DOKUN", canvas.width / 2, canvas.height / 2 + 90);

    } else if (gameState === "PLAYING") {
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        birdVelocity += gravity;
        birdY += birdVelocity;
        
        if (birdImg.complete && birdImg.width > 0) {
            let srcX = birdImg.width * 0.1;
            let srcY = birdImg.height * 0.2;
            let srcW = birdImg.width * 0.8;
            let srcH = birdImg.height * 0.7;
            ctx.drawImage(birdImg, srcX, srcY, srcW, srcH, birdX - birdSize/2, birdY - birdSize/2, birdSize, birdSize);
        } else {
            ctx.fillStyle = "#f39c12";
            ctx.beginPath();
            ctx.arc(birdX, birdY, birdSize/2, 0, Math.PI * 2);
            ctx.fill();
        }

        if (frameCount % 110 === 0) {
            let topPipeHeight = Math.floor(Math.random() * (canvas.height - pipeGap - 120)) + 60;
            pipes.push({ x: canvas.width, top: topPipeHeight, bottom: canvas.height - topPipeHeight - pipeGap, passed: false });
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(pipes[i].x, 0, pipeWidth, pipes[i].top);
            ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipeWidth, pipes[i].bottom);

            if (!pipes[i].passed && pipes[i].x + pipeWidth < birdX) {
                score++;
                pipes[i].passed = true;
            }

            let radius = birdSize / 2 - 4;
            if (birdX + radius > pipes[i].x && birdX - radius < pipes[i].x + pipeWidth &&
                (birdY - radius < pipes[i].top || birdY + radius > canvas.height - pipes[i].bottom)) {
                
                // OYUN BİTTİĞİ AN: Rekor kontrolü yap ve kaydet
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("flappyHighScore", highScore);
                }
                gameState = "GAMEOVER";
                bgMusic.pause(); 
                bgMusic.currentTime = 0;
            }

            if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
        }

        if (birdY + birdSize/2 > canvas.height || birdY - birdSize/2 < 0) {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("flappyHighScore", highScore);
            }
            gameState = "GAMEOVER";
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }

        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText(score, canvas.width / 2, 60);
        frameCount++;

    } else if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Oyun Bitti Görseli
        if (gameOverImg.complete && gameOverImg.width > 0) {
            ctx.drawImage(gameOverImg, canvas.width / 2 - 125, canvas.height / 2 - 200, 250, 250);
        }

        // --- YENİLENMİŞ SKOR PANELİ VE MADALYA ALANI ---
        ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
        ctx.fillRect(40, canvas.height / 2 + 60, 320, 110);

        ctx.fillStyle = "#fff";
        ctx.textAlign = "left";
        ctx.font = "bold 18px Arial";
        ctx.fillText(`Skor: ${score}`, 70, canvas.height / 2 + 100);
        ctx.fillText(`En Yüksek: ${highScore}`, 70, canvas.height / 2 + 140);

        // Madalya Kararı Verme ve Çizdirme
        ctx.textAlign = "center";
        if (score >= 20) {
            drawMedal(300, canvas.height / 2 + 115, "GOLD");
        } else if (score >= 10) {
            drawMedal(300, canvas.height / 2 + 115, "SILVER");
        } else if (score >= 5) {
            drawMedal(300, canvas.height / 2 + 115, "BRONZE");
        } else {
            ctx.fillStyle = "#e74c3c";
            ctx.font = "12px Arial";
            ctx.fillText("Madalya Yok", 300, canvas.height / 2 + 120);
        }

        // Alt Bilgiler
        ctx.fillStyle = "#fff";
        ctx.font = "bold 24px Arial";
        ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 + 210);
        
        ctx.font = "16px Arial";
        ctx.fillStyle = "#ddd";
        ctx.fillText("Menüye Dönmek İçin Dokun", canvas.width / 2, canvas.height / 2 + 240);
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
